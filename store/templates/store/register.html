{% extends 'store/base.html' %}
{% block title %}Sign Up – ShopBy{% endblock %}

{% block content %}
<div class="page">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-icon">✨</div>
      <h2>Join ShopBy!</h2>
      <p class="auth-sub">Create your free account today</p>

      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Pick a cool username" required autofocus/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="you@email.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password1" placeholder="At least 6 characters" required/>
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" name="password2" placeholder="Type it again" required/>
        </div>
        <button type="submit" class="submit-btn">Create Account 🎉</button>
      </form>

      <p class="auth-switch">
        Already have an account? <a href="{% url 'login' %}">Log in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
