{% extends 'store/base.html' %}
{% block title %}Login – ShopBy{% endblock %}

{% block content %}
<div class="page">
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="auth-icon">🔑</div>
      <h2>Welcome Back!</h2>
      <p class="auth-sub">Log in to your ShopBy account</p>

      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" placeholder="Your username" required autofocus/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" placeholder="Your password" required/>
        </div>
        <button type="submit" class="submit-btn">Login 🚀</button>
      </form>

      <p class="auth-switch">
        Don't have an account? <a href="{% url 'register' %}">Sign up free!</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
